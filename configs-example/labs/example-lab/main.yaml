nets:
  ex-net:
    # Type can have two different values: "local-bridge" and "sdn-bridge"
    # (sdn-bridge is currently not implemented and cannot be used)
    type: local-bridge
    # Optional. Determines if the bridge is auto-started on node startup.
    # default: true
    autostart: true
    # Optional. Makes the bridge VLAN-aware, allowing tagged traffic through.
    # default: false
    vlan-aware: true
    # Optional. VLAN IDs allowed on the bridge (bridge-vids).
    # Space-separated list of VLAN IDs and/or ranges, e.g. "2-4094" or "10 20 100-200".
    # Only applied when vlan-aware is true.
    vlans: '10-20 110 120'
    # Optional.
    # default: 1500
    mtu: 1500
    # Optional. Does not support variables.
    # default format: "group_username_lab-name_net-name"
    comment: ''
    # Optional. Adds ports to the bridge.
    bridge-ports: eth1, eth2
    # All IP settings below are optional, no defaults.
    ipv4-cidr:
    ipv4-gw:
    ipv6-cidr:
    ipv6-gw:

# Settings for the lab deployed on the node.
# Refer to these variables in your Terraform code when creating VMs.
pve-locals:
  # Name of the storage on the Proxmox node.
  storage: storage
  # Node that bridges are deployed on; also used as a variable in VM resources.
  node: pve-node3

# Snapshot settings per lab
snapshots:
  # Whether to create a snapshot after deploying the lab.
  # default: false
  create: true
  # Include RAM state. Requires the VM to be running at deploy time.
  # default: false
  include-ram: true
  # Snapshot name (required when create: true). Must be unique.
  name: "CLEAR"
  # Description visible to users in the Proxmox UI.
  description: "EVEN IF YOU CAN, DON'T DELETE ME, THERE IS NO UNDO"