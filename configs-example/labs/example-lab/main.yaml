nets:
  ex-net:
    # Type can have two different values, it's "local-bridge" and "sdn-bridge" which is currently not implemented and cannot be used
    type: local-bridge
    # Optional to declare, if not set then set as true anyways, determines if the bridge is auto-started on node startup
    # default: true
    autostart: true
    # Optional to declare, follows the same logic of default as "autostart", all of the other defaults are doing the same, from not on it will not be explicitly described
    # default: false
    # !!! IS NOT WORKING NOW DUE TO LACK OF BPG IMPLEMENTATION!!!
    vlan-aware: true
    # If "vlan-aware" is set to true, then you should specify vids here in example format
    vlans: '10-20,110,120'
    # Optional to declare
    # default: 1500
    mtu: 1500
    # Optional to declare, doesn't support variables,
    # default format of created comment: "group_username_lab-name_net-name"
    comment: ''
    # Optional to declare, adds ports to the bridge
    # configure as the following example format
    bridge-ports: eth1, eth2
    # All of the next ip settings are optional to declare
    # defaults: no defaults
    ipv4-cidr:
    ipv4-gw:
    ipv6-cidr:
    ipv6-gw:

# Settings for the lab deployed on node, you wll need to refer to those later in code manually during constructing a lab
pve-locals:
  # Storage option, set the storage name that your actual storage on proxmox has
  # defaults: no defaults
  storage: storage
  # Node option, the node that local-bridge would be deployed on, also a variable to refer to when creating vms
  node: pve-node3

# Snapshots settings per lab
snapshots:
  # Create option, whether to create a snapshot or not
  # default: false
  create: true
  # Include ram option, make sure that VM is running before deploying lab, or the vm is set to be running state in terraform, so the provisioned vm is running right after it's provisioned
  # default: false
  include-ram: true
  # Name option, name of the snapshot that's being created, name should be unique
  # default: no defaults (iirc from code)
  name: "CLEAR"
  # Description of the created snapshot, visible to users
  description: "EVEN IF YOU CAN, DON'T DELETE ME, THERE IS NO UNDO"