proxmox:
  # Link to your proxmox web panel
  # FORMAT "https://example.com/"
  endpoint: ""

  # Option 1: via API Token (You won't be able to change passwords)
  # FORMAT: "USER@REALM!TOKENID=UUID"
  api_token: ""

  # Option 2: via username/password (if api_token is commented out or empty)
  # FORMAT: "user@pam"
  username: ""
  password: ""

  # Check ssl certificate, insecure: false - check, insecure: true - doesn't check
  insecure: false